# supabase/config.toml
#
# Supabase local development & GitHub integration configuration.
# This file is required for Supabase to recognize this directory
# as a valid Supabase project when linked via GitHub.
#
# Dashboard: Supabase → Project Settings → Integrations → GitHub
# Docs: https://supabase.com/docs/guides/cli/config

[api]
# Port for the local Supabase API (only used for local dev with supabase CLI)
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
# Port for the local Postgres instance (only used with supabase CLI)
port = 54322
shadow_port = 54320
major_version = 15

[studio]
port = 54323

[inbucket]
port = 54324

[storage]
file_size_limit = "50MiB"

[auth]
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://localhost:3000"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10

  [auth.email]
  enable_signup = true
  double_confirm_changes = true
  enable_confirmations = false

  [auth.external.google]
  enabled = true
  client_id = "env(GOOGLE_CLIENT_ID)"
  secret = "env(GOOGLE_CLIENT_SECRET)"
